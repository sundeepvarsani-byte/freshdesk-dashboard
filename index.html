<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SET Helpdesk Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg:#0f1117;--surface:#171b26;--surface2:#1e2334;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
    --text:#f0f2f8;--muted:#7a82a0;
    --accent:#1CB47A;--blue:#4f8ef7;--amber:#f5a623;--red:#e55353;--purple:#9b72f5;
    --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;min-height:100vh;}
  .shell{display:grid;grid-template-columns:230px 1fr;min-height:100vh;}

  /* SIDEBAR */
  .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:1.5rem;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .brand{display:flex;align-items:center;gap:10px;padding:0 0.5rem;}
  .brand-icon{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
  .brand-icon svg{width:18px;height:18px;fill:white;}
  .brand-name{font-size:13px;font-weight:600;letter-spacing:-0.02em;}
  .brand-sub{font-size:10px;color:var(--muted);margin-top:1px;}
  .nav-section{display:flex;flex-direction:column;gap:2px;}
  .nav-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;padding:0 0.75rem;margin-bottom:4px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer;transition:background 0.15s,color 0.15s;border:none;background:transparent;width:100%;text-align:left;font-family:var(--font);}
  .nav-item:hover{background:var(--surface2);color:var(--text);}
  .nav-item.active{background:rgba(28,180,122,0.15);color:var(--accent);}
  .nav-item svg{width:15px;height:15px;flex-shrink:0;}
  .nav-divider{height:1px;background:var(--border);margin:4px 0;}
  .hd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .sidebar-footer{margin-top:auto;padding:0 0.5rem;}
  .connected-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--accent);background:rgba(28,180,122,0.1);padding:6px 10px;border-radius:6px;}
  .pulse{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  /* MAIN */
  .main{padding:2rem;overflow-x:hidden;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px;}
  .page-title{font-size:20px;font-weight:600;letter-spacing:-0.03em;}
  .page-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .filter-group{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;}
  .filter-btn{font-family:var(--font);font-size:12px;padding:5px 14px;border:none;border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;}
  .filter-btn.active{background:var(--surface2);color:var(--text);font-weight:500;}

  /* WORKSPACE TABS */
  .ws-tabs{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap;}
  .ws-tab{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:var(--font);}
  .ws-tab:hover{border-color:var(--border2);color:var(--text);}
  .ws-tab.active{color:var(--text);border-color:var(--border2);background:var(--surface2);}
  .ws-tab .tab-dot{width:7px;height:7px;border-radius:50%;}
  .ws-tab .tab-count{font-size:10px;background:rgba(255,255,255,0.08);padding:1px 6px;border-radius:10px;font-family:var(--mono);}

  /* METRICS */
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem;}
  .metric-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;position:relative;overflow:hidden;transition:border-color 0.2s;}
  .metric-card:hover{border-color:var(--border2);}
  .metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-accent,var(--accent));border-radius:12px 12px 0 0;}
  .metric-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
  .metric-value{font-size:28px;font-weight:600;letter-spacing:-0.04em;line-height:1;margin-bottom:8px;}
  .metric-delta{font-size:11px;}
  .delta-up{color:var(--accent)}.delta-down{color:var(--red)}.delta-neutral{color:var(--muted)}

  /* CHARTS */
  .charts-row{display:grid;grid-template-columns:1.7fr 1fr;gap:12px;margin-bottom:1.5rem;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
  .card-title{font-size:13px;font-weight:500;}
  .card-badge{font-size:10px;padding:3px 8px;border-radius:20px;background:rgba(28,180,122,0.12);color:var(--accent);}

  /* BOTTOM */
  .bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .status-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
  .status-item:last-child{border-bottom:none;}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .status-name{font-size:13px;flex:1;}
  .status-bar-track{flex:2;height:4px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
  .status-bar-fill{height:100%;border-radius:4px;}
  .status-count{font-size:13px;font-weight:500;font-family:var(--mono);min-width:32px;text-align:right;}

  /* TABLES */
  .data-table{width:100%;border-collapse:collapse;}
  .data-table th{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);padding:0 8px 10px 0;text-align:left;font-weight:400;border-bottom:1px solid var(--border);}
  .data-table td{padding:9px 8px 9px 0;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
  .data-table tr:last-child td{border-bottom:none;}
  .data-table tr:hover td{background:rgba(255,255,255,0.015);}
  .subject-cell{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  .badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;}
  .b-open{background:rgba(79,142,247,0.15);color:#4f8ef7;}
  .b-pending{background:rgba(245,166,35,0.15);color:#f5a623;}
  .b-resolved{background:rgba(28,180,122,0.15);color:#1CB47A;}
  .b-closed{background:rgba(122,130,160,0.15);color:#7a82a0;}
  .b-urgent{background:rgba(229,83,83,0.15);color:#e55353;}
  .b-high{background:rgba(245,166,35,0.15);color:#f5a623;}
  .b-medium{background:rgba(79,142,247,0.15);color:#4f8ef7;}
  .b-low{background:rgba(122,130,160,0.15);color:#7a82a0;}
  .b-onhold{background:rgba(155,114,245,0.15);color:#9b72f5;}
  .b-3rdparty{background:rgba(251,146,60,0.15);color:#fb923c;}

  .avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}
  .agent-cell{display:flex;align-items:center;gap:8px;}
  .bar-wrap{width:50px;height:3px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:4px;}
  .bar-fill{height:100%;border-radius:3px;background:var(--accent);}

  .loading{display:flex;align-items:center;justify-content:center;height:80px;color:var(--muted);font-size:13px;gap:8px;}
  .spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-msg{background:rgba(229,83,83,0.1);border:1px solid rgba(229,83,83,0.3);border-radius:8px;padding:12px 16px;color:#f98080;font-size:13px;margin-bottom:1.5rem;}
  .mono{font-family:var(--mono);}
  .res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:1.25rem;}
  .res-card{background:var(--surface2);border-radius:8px;padding:12px 14px;}
  .res-agent{font-size:12px;font-weight:500;margin-bottom:6px;display:flex;align-items:center;gap:7px;}
  .res-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
  .res-stat{text-align:center;}
  .res-stat-val{font-size:16px;font-weight:600;font-family:var(--mono);line-height:1;}
  .res-stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:3px;}
  .res-divider{height:1px;background:var(--border);margin:1rem 0;}
  .view{display:none;}.view.active{display:block;}
  .live-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;position:relative;overflow:hidden;}
  .live-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--lc-color,var(--accent));border-radius:12px 12px 0 0;}
  .live-card-val{font-size:32px;font-weight:600;letter-spacing:-0.04em;line-height:1;margin-bottom:4px;}
  .live-card-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
  .live-card-sub{font-size:11px;color:var(--muted);margin-top:6px;}

  select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-family:var(--font);font-size:12px;}
</style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon"><svg viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm0 3a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm0 10.5c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08A7.18 7.18 0 0110 15.5z"/></svg></div>
      <div><div class="brand-name">SET Helpdesk</div><div class="brand-sub">Freshservice · Live</div></div>
    </div>

    <nav class="nav-section">
      <div class="nav-label">Views</div>
      <button class="nav-item active" onclick="showView('overview',this)">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"/></svg>
        Overview
      </button>
      <button class="nav-item" onclick="showView('tickets',this)">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M2 5a2 2 0 012-2h8a2 2 0 012 2v10a2 2 0 002 2H4a2 2 0 01-2-2V5zm3 1h6v4H5V6zm6 6H5v2h6v-2z" clip-rule="evenodd"/></svg>
        All Tickets
      </button>
      <button class="nav-item" onclick="showView('agents',this)">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
        Agents
      </button>
    </nav>

    <div class="nav-divider"></div>

    <nav class="nav-section">
      <div class="nav-label">Helpdesks</div>
      <button class="nav-item" onclick="setWS('all');showView('overview',this)">
        <div class="hd-dot" style="background:#7a82a0"></div>All Helpdesks
      </button>
      <button class="nav-item" onclick="setWS(2);showView('overview',this)">
        <div class="hd-dot" style="background:#4f8ef7"></div>IT
      </button>
      <button class="nav-item" onclick="setWS(3);showView('overview',this)">
        <div class="hd-dot" style="background:#9b72f5"></div>HHS Facilities
      </button>
      <button class="nav-item" onclick="setWS(4);showView('overview',this)">
        <div class="hd-dot" style="background:#1CB47A"></div>TGS Facilities
      </button>

    </nav>

    <div class="sidebar-footer">
      <div class="connected-badge"><div class="pulse"></div>Live · <span id="sidebarTime">—</span></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- OVERVIEW -->
    <div id="view-overview" class="view active">
      <div class="topbar">
        <div>
          <div class="page-title" id="overviewTitle">All Helpdesks</div>
          <div class="page-sub" id="lastUpdated">Loading…</div>
        </div>
        <div class="filter-group">
          <button class="filter-btn active" onclick="setFilter(this,'7d')">7 days</button>
          <button class="filter-btn" onclick="setFilter(this,'30d')">30 days</button>
          <button class="filter-btn" onclick="setFilter(this,'all')">All time</button>
        </div>
      </div>

      <div class="ws-tabs" id="wsTabs"></div>
      <div id="errorMsg" style="display:none" class="error-msg"></div>

      <!-- LIVE STATUS BANNER -->
      <div id="liveBanner" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;"></div>

      <div class="metrics" id="metricsGrid"><div class="loading"><div class="spinner"></div>Loading…</div></div>

      <div class="charts-row">
        <div class="card">
          <div class="card-header"><div class="card-title">New vs resolved over time</div><div class="card-badge">Live</div></div>
          <div style="position:relative;height:200px"><canvas id="trendChart" role="img" aria-label="Ticket trend"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">By priority</div></div>
          <div style="position:relative;height:200px"><canvas id="priorityChart" role="img" aria-label="Priority breakdown"></canvas></div>
        </div>
      </div>

      <div class="bottom-row">
        <div class="card">
          <div class="card-header"><div class="card-title">Status breakdown</div></div>
          <div id="statusList"><div class="loading"><div class="spinner"></div></div></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Agent performance</div></div>
          <div id="agentPerf"><div class="loading"><div class="spinner"></div></div></div>
        </div>
      </div>

      <!-- IT RESOLUTION TIME — only shown when IT workspace selected -->
      <div id="itResolutionSection" style="display:none;margin-top:12px;">
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">IT agent resolution time</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px">Avg time from ticket creation to close/resolve · based on loaded tickets</div>
            </div>
            <div class="card-badge">IT only</div>
          </div>
          <div id="itResolutionContent"><div class="loading"><div class="spinner"></div></div></div>
        </div>
      </div>
    </div>

    <!-- TICKETS -->
    <div id="view-tickets" class="view">
      <div class="topbar">
        <div><div class="page-title">All Tickets</div><div class="page-sub" id="ticketsCount">—</div></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <select id="ticketWSFilter" onchange="renderTicketsTable()">
            <option value="all">All helpdesks</option>
          </select>
          <select id="ticketStatusFilter" onchange="renderTicketsTable()">
            <option value="all">All statuses</option>
            <option value="2">Open</option>
            <option value="3">Pending</option>
            <option value="6">On Hold</option>
            <option value="7">3rd Party</option>
            <option value="4">Resolved</option>
            <option value="5">Closed</option>
          </select>
          <select id="ticketPriFilter" onchange="renderTicketsTable()">
            <option value="all">All priorities</option>
            <option value="4">Urgent</option>
            <option value="3">High</option>
            <option value="2">Medium</option>
            <option value="1">Low</option>
          </select>
        </div>
      </div>
      <div class="card" style="overflow-x:auto">
        <div id="ticketsTableWrap"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

    <!-- AGENTS -->
    <div id="view-agents" class="view">
      <div class="topbar">
        <div><div class="page-title">Agents</div><div class="page-sub" id="agentsCount">—</div></div>
      </div>
      <div class="card">
        <div id="agentsTableWrap"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

  </main>
</div>

<script>
// ── WORKSPACE CONFIG ───────────────────────────────────────────────────────────
const WS = {
  2: { name:'IT',            color:'#4f8ef7' },
  3: { name:'HHS Facilities',color:'#9b72f5' },
  4: { name:'TGS Facilities',color:'#1CB47A' },
};
const WS_IDS = Object.keys(WS).map(Number);

// ── STATE ──────────────────────────────────────────────────────────────────────
let allTickets = [], allAgents = [];
let currentFilter = '7d';
let currentWS = 'all';
let tChart, pChart;

const COLORS = ['#4f8ef7','#1CB47A','#f5a623','#9b72f5','#e55353','#64d2b0','#fb923c','#a78bfa'];
// Status IDs as returned by Freshservice API for this account:
// 2=Open, 3=Pending, 4=Resolved, 5=Closed, 6=On Hold, 7=3rd Party
const STATUS_MAP   = {2:'Open',3:'Pending',4:'Resolved',5:'Closed',6:'On Hold',7:'3rd Party'};
const STATUS_COLOR = {2:'#4f8ef7',3:'#f5a623',4:'#1CB47A',5:'#7a82a0',6:'#9b72f5',7:'#fb923c'};
const STATUS_CLS   = {2:'b-open',3:'b-pending',4:'b-resolved',5:'b-closed',6:'b-onhold',7:'b-3rdparty'};
// Active = Open, Pending, On Hold, 3rd Party (anything not yet resolved/closed)
const ACTIVE_STATUSES = [2, 3, 6, 7];
const CLOSED_STATUSES = [4, 5];
const PRI_MAP      = {1:'Low',2:'Medium',3:'High',4:'Urgent'};
const PRI_CLS      = {1:'b-low',2:'b-medium',3:'b-high',4:'b-urgent'};

// ── HELPERS ────────────────────────────────────────────────────────────────────
function agentName(a) {
  if (!a) return 'Unassigned';
  return a.contact?.name
    || (a.first_name || a.last_name ? `${a.first_name||''} ${a.last_name||''}`.trim() : null)
    || a.name
    || a.email?.split('@')[0]
    || 'Agent';
}
function initials(name) { return name.split(' ').filter(Boolean).map(x=>x[0]).join('').slice(0,2).toUpperCase(); }
function timeAgo(d) { const h=Math.floor((Date.now()-new Date(d))/3600000); return h<1?'Just now':h<24?`${h}h ago`:`${Math.floor(h/24)}d ago`; }

function filterByDate(tickets) {
  if (currentFilter==='all') return tickets;
  const cutoff = new Date(Date.now() - (currentFilter==='7d'?7:30)*86400000);
  return tickets.filter(t=>new Date(t.created_at)>=cutoff);
}
function filterByWS(tickets) {
  if (currentWS==='all') return tickets;
  return tickets.filter(t=>t.workspace_id===currentWS);
}
function getFiltered() { return filterByDate(filterByWS(allTickets)); }

// ── BUILD TABS ─────────────────────────────────────────────────────────────────
function buildTabs() {
  const tabsEl = document.getElementById('wsTabs');
  const wsFilter = document.getElementById('ticketWSFilter');

  // Build workspace tabs with ticket counts
  const allCount = filterByDate(allTickets).length;
  let tabsHTML = `<button class="ws-tab ${currentWS==='all'?'active':''}" onclick="setWSTab(this,'all')">
    <span class="tab-dot" style="background:#7a82a0"></span>All
    <span class="tab-count">${allCount}</span>
  </button>`;

  // Build filter dropdown options
  let optHTML = '<option value="all">All helpdesks</option>';

  WS_IDS.forEach(id => {
    const cfg = WS[id];
    const count = filterByDate(allTickets).filter(t=>t.workspace_id===id).length;
    tabsHTML += `<button class="ws-tab ${currentWS===id?'active':''}" onclick="setWSTab(this,${id})">
      <span class="tab-dot" style="background:${cfg.color}"></span>${cfg.name}
      <span class="tab-count">${count}</span>
    </button>`;
    optHTML += `<option value="${id}">${cfg.name}</option>`;
  });

  tabsEl.innerHTML = tabsHTML;
  wsFilter.innerHTML = optHTML;
}

// ── LIVE STATUS BANNER ────────────────────────────────────────────────────────
function renderLiveBanner() {
  // Always uses ALL tickets for workspace — no date filter
  const ws = filterByWS(allTickets);
  const wsLabel = currentWS === 'all' ? 'All Helpdesks' : (WS[currentWS]?.name || 'Helpdesk');

  const open       = ws.filter(x => x.status === 2).length;
  const onHold     = ws.filter(x => x.status === 6).length;
  const thirdParty = ws.filter(x => x.status === 7).length;
  const pending    = ws.filter(x => x.status === 3).length;
  const active     = open + onHold + thirdParty + pending;

  const cards = [
    { label: 'Total active',  value: active,     sub: 'Open + waiting',         color: currentWS==='all'?'#4f8ef7':(WS[currentWS]?.color||'#4f8ef7') },
    { label: 'Open',          value: open,        sub: 'Being worked on',        color: '#4f8ef7' },
    { label: 'On hold',       value: onHold,      sub: 'Waiting on requester',   color: '#9b72f5' },
    { label: '3rd party',     value: thirdParty,  sub: 'Waiting on 3rd party',   color: '#fb923c' },
  ];

  document.getElementById('liveBanner').innerHTML = cards.map(c => `
    <div class="live-card" style="--lc-color:${c.color}">
      <div class="live-card-label">${c.label}</div>
      <div class="live-card-val" style="color:${c.color}">${c.value}</div>
      <div class="live-card-sub">${c.sub}</div>
    </div>`).join('');
}

// ── RENDER METRICS ─────────────────────────────────────────────────────────────
function renderMetrics() {
  const t = getFiltered();         // date-filtered tickets (for resolved stats)
  const all = filterByWS(allTickets); // ALL tickets for this workspace (no date filter)

  // Live counts — always show current state regardless of date filter
  const active     = all.filter(x=>ACTIVE_STATUSES.includes(x.status)).length;
  const open       = all.filter(x=>x.status===2).length;
  const onHold     = all.filter(x=>x.status===6).length;
  const thirdParty = all.filter(x=>x.status===7).length;
  const urgent     = all.filter(x=>x.priority===4&&ACTIVE_STATUSES.includes(x.status)).length;

  // Resolved within the selected date range
  const resolved  = t.filter(x=>CLOSED_STATUSES.includes(x.status)).length;
  const total     = t.length;
  const resRate   = total?Math.round(resolved/total*100):0;
  const accent    = currentWS==='all'?'#1CB47A':(WS[currentWS]?.color||'#1CB47A');

  document.getElementById('metricsGrid').innerHTML=[
    {label:'Active tickets',value:active,delta:`${open} open · ${onHold} on hold · ${thirdParty} 3rd party`,cls:'delta-neutral',accent:'#4f8ef7'},
    {label:'Open',value:open,delta:`${onHold} on hold · ${thirdParty} with 3rd party`,cls:'delta-neutral',accent:'#4f8ef7'},
    {label:'Resolved / Closed',value:resolved,delta:`${resRate}% in selected period`,cls:resRate>70?'delta-up':'delta-neutral',accent:'#1CB47A'},
    {label:'Urgent active',value:urgent,delta:active?`${Math.round(urgent/active*100)}% of active`:'—',cls:urgent>5?'delta-down':'delta-up',accent:urgent>5?'#e55353':'#1CB47A'},
  ].map(c=>`<div class="metric-card" style="--card-accent:${c.accent}">
    <div class="metric-label">${c.label}</div>
    <div class="metric-value">${c.value}</div>
    <div class="metric-delta ${c.cls}">${c.delta}</div>
  </div>`).join('');
}

// ── RENDER CHARTS ──────────────────────────────────────────────────────────────
function renderCharts() {
  const t = getFiltered();
  const days = currentFilter==='7d'?7:currentFilter==='30d'?30:60;
  const newB={},resB={};
  for(let i=days-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const k=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    newB[k]=0;resB[k]=0;
  }
  t.forEach(ticket=>{
    const k=new Date(ticket.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    if(k in newB)newB[k]++;
    if((ticket.status===4||ticket.status===5)&&k in resB)resB[k]++;
  });
  const labels=Object.keys(newB).slice(-12);
  const hdColor=currentWS==='all'?'#4f8ef7':(WS[currentWS]?.color||'#4f8ef7');

  if(tChart)tChart.destroy();
  tChart=new Chart(document.getElementById('trendChart'),{
    type:'line',
    data:{labels,datasets:[
      {label:'New',data:labels.map(k=>newB[k]),borderColor:hdColor,backgroundColor:hdColor+'1a',fill:true,tension:0.4,pointRadius:3,borderWidth:2},
      {label:'Resolved',data:labels.map(k=>resB[k]),borderColor:'#1CB47A',backgroundColor:'#1CB47A1a',fill:true,tension:0.4,pointRadius:3,borderWidth:2,borderDash:[4,3]},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#7a82a0',boxWidth:10,font:{size:11,family:'DM Sans'},padding:16}}},
      scales:{x:{grid:{display:false},ticks:{color:'#7a82a0',font:{size:10},maxTicksLimit:8}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#7a82a0',font:{size:10}}}}
    }
  });

  const pCounts=[1,2,3,4].map(p=>t.filter(x=>x.priority===p).length);
  if(pChart)pChart.destroy();
  pChart=new Chart(document.getElementById('priorityChart'),{
    type:'doughnut',
    data:{labels:['Low','Medium','High','Urgent'],datasets:[{data:pCounts,backgroundColor:['#7a82a0','#4f8ef7','#f5a623','#e55353'],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'68%',
      plugins:{legend:{position:'right',labels:{color:'#7a82a0',boxWidth:10,font:{size:11,family:'DM Sans'},padding:10}}}
    }
  });
}

// ── RENDER STATUS ──────────────────────────────────────────────────────────────
function renderStatus() {
  const t=getFiltered();
  const maxC=Math.max(...[2,3,4,5,6,7].map(s=>t.filter(x=>x.status===s).length),1);
  document.getElementById('statusList').innerHTML=[2,3,6,7,4,5].filter(s=>t.some(x=>x.status===s)||[2,4,5].includes(s)).map(s=>{
    const c=t.filter(x=>x.status===s).length;
    return `<div class="status-item">
      <div class="status-dot" style="background:${STATUS_COLOR[s]}"></div>
      <div class="status-name">${STATUS_MAP[s]}</div>
      <div class="status-bar-track"><div class="status-bar-fill" style="width:${Math.round(c/maxC*100)}%;background:${STATUS_COLOR[s]}"></div></div>
      <div class="status-count mono">${c}</div>
    </div>`;
  }).join('');
}

// ── RENDER AGENT PERF ──────────────────────────────────────────────────────────
function renderAgentPerf() {
  if(!allAgents.length){document.getElementById('agentPerf').innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px 0">No agents found.</div>';return;}
  const t=getFiltered();
  const stats=allAgents.map((a,i)=>{
    const mine=t.filter(x=>x.responder_id===a.id);
    return{name:agentName(a),resolved:mine.filter(x=>x.status===4||x.status===5).length,open:mine.filter(x=>x.status===2).length,color:COLORS[i%COLORS.length]};
  }).sort((a,b)=>b.resolved-a.resolved).slice(0,6);
  const maxR=Math.max(...stats.map(s=>s.resolved),1);

  document.getElementById('agentPerf').innerHTML=`<table class="data-table">
    <thead><tr><th>Agent</th><th>Resolved</th><th>Open</th><th>Rate</th></tr></thead>
    <tbody>${stats.map(a=>`<tr>
      <td><div class="agent-cell"><div class="avatar" style="background:${a.color}22;color:${a.color}">${initials(a.name)}</div>${a.name.split(' ')[0]}</div></td>
      <td class="mono">${a.resolved}</td>
      <td class="mono" style="color:var(--muted)">${a.open}</td>
      <td><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(a.resolved/maxR*100)}%"></div></div></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

// ── IT RESOLUTION TIME ────────────────────────────────────────────────────────

// Business hours: Mon-Fri 08:00-16:00 local time
const BIZ_START = 8;   // 08:00
const BIZ_END   = 16;  // 16:00
const BIZ_HOURS_PER_DAY = BIZ_END - BIZ_START; // 8

function businessHoursBetween(startDate, endDate) {
  if (endDate <= startDate) return 0;
  let total = 0;
  const cursor = new Date(startDate);

  // Snap cursor forward to next business moment if outside hours
  function snapForward(d) {
    const day = d.getDay(); // 0=Sun, 6=Sat
    // If weekend, move to Monday 08:00
    if (day === 0) { d.setDate(d.getDate() + 1); d.setHours(BIZ_START, 0, 0, 0); }
    if (day === 6) { d.setDate(d.getDate() + 2); d.setHours(BIZ_START, 0, 0, 0); }
    // If before 08:00, move to 08:00
    if (d.getHours() < BIZ_START) { d.setHours(BIZ_START, 0, 0, 0); }
    // If at or after 16:00, move to next weekday 08:00
    if (d.getHours() >= BIZ_END) {
      d.setDate(d.getDate() + 1);
      d.setHours(BIZ_START, 0, 0, 0);
      snapForward(d); // recurse in case next day is weekend
    }
  }

  snapForward(cursor);
  if (cursor >= endDate) return 0;

  while (cursor < endDate) {
    const day = cursor.getDay();
    if (day !== 0 && day !== 6) {
      // End of business today
      const endOfDay = new Date(cursor);
      endOfDay.setHours(BIZ_END, 0, 0, 0);
      const chunkEnd = endOfDay < endDate ? endOfDay : endDate;
      const chunkStart = cursor < new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate(), BIZ_START)
        ? new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate(), BIZ_START)
        : cursor;
      if (chunkEnd > chunkStart) {
        total += (chunkEnd - chunkStart) / 3600000;
      }
    }
    // Move to next day 08:00
    cursor.setDate(cursor.getDate() + 1);
    cursor.setHours(BIZ_START, 0, 0, 0);
  }
  return total;
}

function formatDuration(hours) {
  if (hours < 1) return `${Math.round(hours * 60)}m`;
  if (hours < BIZ_HOURS_PER_DAY) return `${Math.round(hours)}h`;
  const d = Math.floor(hours / BIZ_HOURS_PER_DAY);
  const h = Math.round(hours % BIZ_HOURS_PER_DAY);
  return h > 0 ? `${d}d ${h}h` : `${d}d`;
}

function renderITResolution() {
  const section = document.getElementById('itResolutionSection');

  // Only show this panel when viewing IT workspace
  if (currentWS !== 2 && currentWS !== 'all') {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';

  // Only use IT tickets that are resolved or closed and have both timestamps
  const itTickets = filterByDate(allTickets).filter(t =>
    t.workspace_id === 2 &&
    CLOSED_STATUSES.includes(t.status) &&
    t.created_at && t.updated_at
  );

  if (!itTickets.length || !allAgents.length) {
    document.getElementById('itResolutionContent').innerHTML =
      '<div style="color:var(--muted);font-size:13px;padding:8px 0">No resolved IT tickets in this period.</div>';
    return;
  }

  // Calculate per-agent stats
  const COLORS = ['#4f8ef7','#1CB47A','#f5a623','#9b72f5','#e55353','#64d2b0','#fb923c','#a78bfa'];
  const itAgents = allAgents.filter(a =>
    itTickets.some(t => t.responder_id === a.id)
  );

  const agentStats = itAgents.map((a, i) => {
    const mine = itTickets.filter(t => t.responder_id === a.id);
    if (!mine.length) return null;

    const durations = mine.map(t => {
      const created = new Date(t.created_at);
      const closed  = new Date(t.updated_at);
      return businessHoursBetween(created, closed); // business hours only
    }).filter(h => h > 0);

    if (!durations.length) return null;

    const avg = durations.reduce((a,b) => a+b, 0) / durations.length;
    const min = Math.min(...durations);
    const max = Math.max(...durations);
    const under24 = durations.filter(h => h <= 24).length;
    const slaRate = Math.round(under24 / durations.length * 100);

    return {
      name: agentName(a),
      color: COLORS[i % COLORS.length],
      count: mine.length,
      avg, min, max, slaRate,
    };
  }).filter(Boolean).sort((a, b) => a.avg - b.avg); // fastest first

  if (!agentStats.length) {
    document.getElementById('itResolutionContent').innerHTML =
      '<div style="color:var(--muted);font-size:13px;padding:8px 0">No agent-assigned resolved tickets found.</div>';
    return;
  }

  // Overall summary
  const allDurations = itTickets
    .map(t => businessHoursBetween(new Date(t.created_at), new Date(t.updated_at)))
    .filter(h => h > 0);
  const overallAvg = allDurations.reduce((a,b) => a+b, 0) / allDurations.length;
  const overallSLA = Math.round(allDurations.filter(h => h <= 24).length / allDurations.length * 100);

  document.getElementById('itResolutionContent').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;">
      <div style="background:var(--surface2);border-radius:8px;padding:12px 14px;text-align:center;">
        <div style="font-size:22px;font-weight:600;font-family:var(--mono);color:var(--accent)">${formatDuration(overallAvg)}</div>
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px">Avg resolution time</div>
      </div>
      <div style="background:var(--surface2);border-radius:8px;padding:12px 14px;text-align:center;">
        <div style="font-size:22px;font-weight:600;font-family:var(--mono);color:var(--blue)">${itTickets.length}</div>
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px">Resolved tickets</div>
      </div>
      <div style="background:var(--surface2);border-radius:8px;padding:12px 14px;text-align:center;">
        <div style="font-size:22px;font-weight:600;font-family:var(--mono);color:${overallSLA>=80?'var(--accent)':'#f5a623'}">${overallSLA}%</div>
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px">Closed within 24h</div>
      </div>
    </div>

    <div class="res-divider"></div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.06em;">By agent — fastest first</div>

    <div class="res-grid">
      ${agentStats.map(a => `
        <div class="res-card">
          <div class="res-agent">
            <div class="avatar" style="width:22px;height:22px;font-size:9px;background:${a.color}22;color:${a.color}">${initials(a.name)}</div>
            <span>${a.name}</span>
            <span style="margin-left:auto;font-size:10px;color:var(--muted)">${a.count} tickets</span>
          </div>
          <div class="res-stats">
            <div class="res-stat">
              <div class="res-stat-val" style="color:var(--accent)">${formatDuration(a.avg)}</div>
              <div class="res-stat-lbl">Avg</div>
            </div>
            <div class="res-stat">
              <div class="res-stat-val" style="color:var(--blue)">${formatDuration(a.min)}</div>
              <div class="res-stat-lbl">Fastest</div>
            </div>
            <div class="res-stat">
              <div class="res-stat-val" style="color:${a.slaRate>=80?'var(--accent)':'#f5a623'}">${a.slaRate}%</div>
              <div class="res-stat-lbl">Within 24h</div>
            </div>
          </div>
        </div>`).join('')}
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">
      * Resolution time calculated in business hours (Mon–Fri, 08:00–16:00) from ticket creation to last update on resolved/closed tickets.
    </div>`;
}

// ── NAV ────────────────────────────────────────────────────────────────────────
function showView(name,btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(name==='tickets')renderTicketsTable();
  if(name==='agents')renderAgentsView();
}

function setFilter(btn,key) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter=key;
  renderAll();
}

function setWS(id) {
  currentWS=id;
  document.getElementById('overviewTitle').textContent=id==='all'?'All Helpdesks':(WS[id]?.name||'Helpdesk');
}

function setWSTab(btn,id) {
  document.querySelectorAll('.ws-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  setWS(id);
  renderAll();
  buildTabs(); // refresh counts
}

function renderAll() {
  buildTabs();
  renderLiveBanner();
  renderMetrics();
  renderCharts();
  renderStatus();
  renderAgentPerf();
  renderITResolution();
}

// ── LOAD ───────────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    document.getElementById('errorMsg').style.display='none';

    // Fetch all tickets across all workspaces via dedicated endpoint
    const ticketResp = await fetch('/api/alltickets').then(r=>r.json());
    allTickets = ticketResp.tickets || [];

    // Fetch active agents across all workspaces, deduped
    const agResp = await fetch('/api/allagents').then(r=>r.json());
    allAgents = agResp.agents || [];

    const now=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('lastUpdated').textContent=`Last updated ${now} · ${allTickets.length} tickets · ${allAgents.length} active agents`;
    document.getElementById('sidebarTime').textContent=now;

    renderAll();
    renderAgentsView();

  } catch(err) {
    const el=document.getElementById('errorMsg');
    el.style.display='block';
    el.textContent='Could not load data: '+err.message;
  }
}

loadData();
setInterval(loadData,120000);
</script>
